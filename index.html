<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rastreador de Ônibus · BH</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

    <link rel="stylesheet" href="./style.css" />
</head>
<body>

<!-- ── SIDEBAR ─────────────────────────────────────────────── -->
<aside id="sidebar">
    <div id="sidebar-header">
        <div class="brand">
            <span class="brand-icon"><i class="bi bi-bus-front-fill"></i></span>
            <div>
                <div class="brand-title">BH Rastreador</div>
                <div class="brand-sub">Tempo Real · BHTRANS</div>
            </div>
        </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
        <span id="status-dot" class="dot dot--loading"></span>
        <span id="status-text">Conectando…</span>
        <span id="bus-count" class="ms-auto badge-count">–</span>
    </div>

    <!-- Filter -->
    <div id="filter-section">
        <label class="section-label"><i class="bi bi-funnel-fill me-1"></i>Filtrar linha</label>
        <div class="search-wrap">
            <input
                    type="text"
                    id="line-input"
                    class="line-input"
                    placeholder="Ex: 8001A, 301…"
                    autocomplete="off"
                    spellcheck="false"
            />
            <button id="btn-search" title="Buscar linha">
                <i class="bi bi-search"></i>
            </button>
        </div>
        <div id="suggestions-box"></div>
        <button id="btn-clear" class="btn-clear d-none">
            <i class="bi bi-x-circle-fill me-1"></i>Limpar filtro
        </button>
    </div>

    <!-- Active line card -->
    <div id="line-card" class="d-none">
        <div class="line-card-header">
            <span id="lc-code" class="lc-code"></span>
            <span id="lc-name" class="lc-name"></span>
        </div>
        <div class="line-card-stats">
            <div class="stat">
                <i class="bi bi-bus-front"></i>
                <span id="lc-buses">–</span>
                <small>ônibus</small>
            </div>
            <div class="stat">
                <i class="bi bi-sign-stop"></i>
                <span id="lc-stops">–</span>
                <small>paradas</small>
            </div>
            <div class="stat nearest-stat">
                <i class="bi bi-geo-alt-fill"></i>
                <span id="lc-nearest">–</span>
                <small>parada próx.</small>
            </div>
        </div>
    </div>

    <!-- Legend -->
    <div id="legend">
        <div class="section-label"><i class="bi bi-layers-fill me-1"></i>Legenda</div>
        <div class="legend-item">
            <svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#00e5ff" opacity="0.85"/></svg>
            Ônibus em movimento
        </div>
        <div class="legend-item">
            <svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#b388ff" opacity="0.9"/></svg>
            Parada da linha
        </div>
        <div class="legend-item">
            <svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#ff1744"/></svg>
            Parada mais próxima
        </div>
        <div class="legend-item">
            <svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="none" stroke="#76ff03" stroke-width="2"/></svg>
            Sua localização
        </div>
    </div>

    <!-- Timer -->
    <div id="timer-bar">
        <i class="bi bi-arrow-clockwise me-1"></i>
        <span id="timer-text">Atualiza em 20s</span>
        <div id="timer-progress"><div id="timer-fill"></div></div>
    </div>

    <!-- Mobile toggle -->
    <button id="sidebar-toggle" aria-label="Toggle sidebar">
        <i class="bi bi-chevron-left"></i>
    </button>
</aside>

<!-- ── MAP ─────────────────────────────────────────────────── -->
<main id="map-container">
    <div id="map"></div>

    <!-- Floating locate button -->
    <button id="btn-locate" title="Minha localização">
        <i class="bi bi-crosshair2"></i>
    </button>

    <!-- Toast -->
    <div id="toast-container">
        <div id="toast" class="toast-msg d-none"></div>
    </div>
</main>

<!-- ── SCRIPTS ─────────────────────────────────────────────── -->
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- PapaParse -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<!-- Proj4js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>

<!-- Bootstrap JS bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js?v=4"></script>
</body>
</html>
