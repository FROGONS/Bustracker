<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador de Ônibus BH</title>
    
    <!-- Favicon (imagem da guia) -->
    <link rel="icon" type="image/x-icon" href="image/favicon.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- CSS adicional do projeto -->
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <header class="bg-dark text-white py-3 shadow-sm">
        <div class="container-fluid">
            <div class="row g-2 align-items-center">
                <div class="col-12 col-md-4">
                    <h1 class="h5 mb-0">Rastreador de Ônibus BH</h1>
                    <small class="text-white-50">Tempo real, filtro por linha e pontos de parada</small>
                </div>

                <div class="col-12 col-md-5">
                    <label for="filtroLinha" class="form-label visually-hidden">Filtrar linha</label>
                    <input
                        id="filtroLinha"
                        class="form-control"
                        list="listaLinhas"
                        placeholder="Digite uma linha. Ex: 8001A, 3050, 3301A"
                        autocomplete="off"
                    >
                    <datalist id="listaLinhas"></datalist>
                </div>

                <div class="col-12 col-md-3 d-flex gap-2">
                    <button id="btnLimparFiltro" class="btn btn-outline-light w-50" type="button">Limpar</button>
                    <button id="btnAtualizar" class="btn btn-success w-50" type="button">Atualizar</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container-fluid bg-light border-bottom py-2 painel-controle">
            <div class="row gy-1 small">
                <div class="col-12 col-md-5" id="statusSistema">Carregando dados...</div>
                <div class="col-12 col-md-4" id="statusFiltro">Visão geral: todos os ônibus ativos.</div>
                <div class="col-12 col-md-3">
                    <span><span class="legenda-cor cor-onibus"></span>Ônibus</span>
                    <span class="ms-2"><span class="legenda-cor cor-ponto"></span>Ponto</span>
                    <span class="ms-2"><span class="legenda-cor cor-proximo"></span>Mais próximo</span>
                </div>
            </div>
        </div>

        <div id="map"></div>
    </main>

    <!-- Bibliotecas -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/proj4@2.11.0/dist/proj4.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Código do projeto -->
    <script src="js/sketch.js"></script>
</body>
</html>
